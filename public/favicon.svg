<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="MBS Road Control Tower">
  <!-- Brand tile background -->
  <rect width="64" height="64" rx="14" fill="#066058"/>

  <!-- Signal arcs (cyan accent) -->
  <path d="M9 22 Q14 16 19 20" fill="none" stroke="#0AEBD7" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 20 Q50 16 55 22" fill="none" stroke="#0AEBD7" stroke-width="2" stroke-linecap="round"/>

  <!-- Antenna -->
  <circle cx="32" cy="7" r="2.2" fill="#0AEBD7"/>
  <rect x="30.8" y="9" width="2.4" height="6.5" fill="#fff"/>

  <!-- Cabin (control room) — outlined box -->
  <path d="M16 15 H48 V29 H16 Z M20 18.5 H44 V25.5 H20 Z" fill="#fff" fill-rule="evenodd"/>

  <!-- Tower trunk (tapered) -->
  <path d="M27 29 L23 51 L41 51 L37 29 Z" fill="#fff"/>

  <!-- Road / ground -->
  <rect x="7" y="52" width="50" height="4" rx="2" fill="#0AEBD7"/>
</svg>
